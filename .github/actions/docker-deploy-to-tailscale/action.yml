name: "Docker Deploy to Tailscale Server"
description: "Builds Docker image on CI, pushes to GHCR, and deploys to a Tailscale server"
inputs:
  server_ip:
    description: "IP or hostname of the server"
    required: true
  ssh_user:
    description: "SSH user name"
    required: true
  ts_oauth_client_id:
    description: "Tailscale OAuth Client ID"
    required: true
  ts_oauth_secret:
    description: "Tailscale OAuth Secret"
    required: true
  tags:
    description: "Tags for Tailscale"
    required: true
  github_token:
    description: "GitHub Token for GHCR authentication"
    required: true

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4 # Aggiornato alla v4, più recente

    # 1. Login su GitHub Container Registry (GHCR) dalla CI
    - name: Log in to the Container registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.github_token }}

    # 2. Build e Push di tutte le immagini usando docker-compose
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push Docker images
      shell: bash
      env:
        DOCKER_BUILD_RECORD_UPLOAD: false
      run: |
        # Abilitiamo esplicitamente BuildKit e diciamo a Docker di salvare la cache "inline" nell'immagine
        export COMPOSE_DOCKER_CLI_BUILD=1
        export DOCKER_BUILDKIT=1
        docker compose build --build-arg BUILDKIT_INLINE_CACHE=1
        docker compose push

    # 3. Connessione Tailscale
    - name: Tailscale
      uses: tailscale/github-action@v2
      with:
        oauth-client-id: ${{ inputs.ts_oauth_client_id }}
        oauth-secret: ${{ inputs.ts_oauth_secret }}
        tags: ${{ inputs.tags }}

    # 4. Deploy sul Server
    - name: Deploy to Server
      env:
        SERVER_IP: ${{ inputs.server_ip }}
        SSH_USER: ${{ inputs.ssh_user }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
        GITHUB_ACTOR: ${{ github.actor }}
      shell: bash
      run: |
        if [ -z "$SERVER_IP" ] || [ -z "$SSH_USER" ]; then
          echo "Error: Environment variables SERVER_IP or SSH_USER are not set"
          exit 1
        fi

        CONNECTION="$SSH_USER@$SERVER_IP"
        echo "Attempting to connect to $CONNECTION"

        if ! ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 $CONNECTION 'echo "SSH connection successful"'; then
          echo "Error: Cannot establish SSH connection"
          exit 1
        fi

        REPO_NAME=$(echo "${{ github.repository }}" | cut -d "/" -f2)
        echo "Setting up repository: $REPO_NAME"

        ssh -o StrictHostKeyChecking=no $CONNECTION "
          set -e
          if [ ! -d ~/$REPO_NAME ]; then
            echo 'Cloning repository...'
            git clone https://github.com/${{ github.repository }} ~/$REPO_NAME
            cd ~/$REPO_NAME
          else
            echo 'Updating existing repository...'
            cd ~/$REPO_NAME
            git fetch
            git reset --hard HEAD
            git pull
          fi

          git config core.fileMode false

          # Login a GHCR sulla VPS
          echo '$GITHUB_TOKEN' | docker login ghcr.io -u '$GITHUB_ACTOR' --password-stdin

          echo 'Pulling latest Docker image...'
          docker compose pull

          echo 'Starting application with Docker Compose...'
          docker compose up -d --remove-orphans

          echo 'Cleaning up unused Docker images...'
          docker image prune -f

          echo 'Deployment completed successfully'
        "
